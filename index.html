<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InterviewHub · 技术面试题库</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>🦆</text></svg>">
  <style>
    /* ─── CSS 变量 ─── */
    :root {
      --brand:        #f59e0b;
      --brand-light:  #fef3c7;
      --brand-dark:   #d97706;
      --brand-bg:     #fffbeb;
      --accent:       #f97316;
      --bg:           #ffffff;
      --bg-sidebar:   #fafbfc;
      --bg-card:      #ffffff;
      --bg-tag:       #f3f4f6;
      --border:       #e5e7eb;
      --text:         #1f2937;
      --text-sub:     #6b7280;
      --text-muted:   #9ca3af;
      --green:        #10b981;
      --orange:       #f59e0b;
      --red:          #ef4444;
      --purple:       #8b5cf6;
      --cyan:         #06b6d4;
      --nav-h:        56px;
      --sidebar-left-w: 240px;
      --sidebar-right-w: 280px;
      --radius:       8px;
      --radius-lg:    12px;
      --shadow-sm:    0 1px 3px rgba(0,0,0,.06);
      --shadow-md:    0 4px 12px rgba(0,0,0,.08);
      --shadow-lg:    0 8px 24px rgba(0,0,0,.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: var(--text); background: #f5f6f8; line-height: 1.7; min-height: 100vh;
    }
    a { color: var(--brand-dark); text-decoration: none; }
    a:hover { text-decoration: underline; }
    ul, ol { list-style: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; }

    /* ─── 顶部导航 ─── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
      background: var(--bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px;
      z-index: 100; gap: 0; box-shadow: var(--shadow-sm);
    }
    .nav-brand {
      display: flex; align-items: center; gap: 8px;
      font-size: 17px; font-weight: 700; color: var(--text);
      text-decoration: none; white-space: nowrap; margin-right: 24px;
    }
    .nav-brand:hover { text-decoration: none; color: var(--brand-dark); }
    .nav-brand .logo-icon {
      width: 34px; height: 34px; background: linear-gradient(135deg, var(--brand), var(--accent));
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #fff;
    }
    .nav-links { display: flex; gap: 2px; flex: 1; align-items: center; }
    .nav-link {
      padding: 6px 14px; border-radius: 6px; font-size: 14px;
      color: var(--text-sub); transition: all .15s; white-space: nowrap;
    }
    .nav-link:hover { background: var(--bg-tag); color: var(--text); text-decoration: none; }
    .nav-link.active { background: var(--brand-light); color: var(--brand-dark); font-weight: 600; }

    .nav-right { display: flex; align-items: center; gap: 12px; }
    .search-box {
      display: flex; align-items: center; gap: 8px; background: #f3f4f6;
      border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px;
      width: 240px; transition: all .2s;
    }
    .search-box:focus-within {
      background: #fff; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(245,158,11,.15); width: 280px;
    }
    .search-box input {
      border: none; outline: none; background: none; font-size: 13px; color: var(--text); flex: 1; min-width: 0;
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-icon { color: var(--text-muted); font-size: 14px; flex-shrink: 0; }
    .kbd {
      font-size: 11px; color: var(--text-muted); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px; font-family: monospace; background: #fff;
    }
    .nav-github {
      display: flex; align-items: center; gap: 6px; padding: 6px 12px;
      border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
      color: var(--text-sub); transition: all .15s;
    }
    .nav-github:hover { border-color: var(--text); color: var(--text); text-decoration: none; }

    /* ─── 三栏布局 ─── */
    .layout {
      margin-top: var(--nav-h); display: flex; min-height: calc(100vh - var(--nav-h));
      max-width: 1400px; margin-left: auto; margin-right: auto; padding: 0 16px; gap: 20px;
    }
    @media (min-width: 1400px) { .layout { padding: 0 24px; } }

    /* ─── 左侧栏 ─── */
    .sidebar-left {
      width: var(--sidebar-left-w); flex-shrink: 0; padding-top: 20px;
      position: sticky; top: var(--nav-h); height: calc(100vh - var(--nav-h));
      overflow-y: auto;
    }
    .sidebar-left::-webkit-scrollbar { width: 4px; }
    .sidebar-left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sidebar-section { margin-bottom: 4px; }
    .sidebar-heading {
      padding: 8px 16px 4px; font-size: 11px; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em;
    }
    .sidebar-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; font-size: 13.5px; color: var(--text-sub);
      cursor: pointer; transition: all .12s; border-radius: 6px;
      margin: 1px 8px;
    }
    .sidebar-item:hover { background: #f3f4f6; color: var(--text); }
    .sidebar-item.active { background: var(--brand-light); color: var(--brand-dark); font-weight: 600; }
    .sidebar-item .count {
      font-size: 11px; background: #e5e7eb; color: var(--text-muted);
      border-radius: 10px; padding: 1px 8px; min-width: 22px; text-align: center;
    }
    .sidebar-item.active .count { background: rgba(245,158,11,.2); color: var(--brand-dark); }
    .sidebar-sub .sidebar-item { padding-left: 28px; font-size: 13px; }
    .sidebar-divider { height: 1px; background: var(--border); margin: 8px 16px; }

    /* ─── 主内容 ─── */
    .main {
      flex: 1; min-width: 0; padding: 20px 0 80px;
    }

    /* ─── 右侧栏 ─── */
    .sidebar-right {
      width: var(--sidebar-right-w); flex-shrink: 0; padding-top: 20px;
      position: sticky; top: var(--nav-h); height: calc(100vh - var(--nav-h));
      overflow-y: auto;
    }
    .sidebar-right::-webkit-scrollbar { width: 4px; }
    .sidebar-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .right-card {
      background: var(--bg); border-radius: var(--radius-lg);
      border: 1px solid var(--border); padding: 16px; margin-bottom: 16px;
    }
    .right-card h4 {
      font-size: 14px; font-weight: 700; margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .right-card h4 .icon { font-size: 16px; }
    .right-hot-item {
      display: flex; align-items: center; gap: 8px; padding: 6px 0;
      font-size: 13px; border-bottom: 1px solid #f3f4f6; cursor: pointer;
      transition: color .12s;
    }
    .right-hot-item:last-child { border-bottom: none; }
    .right-hot-item:hover { color: var(--brand-dark); }
    .right-hot-item .rank {
      width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
      border-radius: 4px; font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .right-hot-item .rank.top1 { background: #fef3c7; color: #d97706; }
    .right-hot-item .rank.top2 { background: #f3f4f6; color: #6b7280; }
    .right-hot-item .rank.top3 { background: #fef2f2; color: #dc2626; }
    .right-hot-item .rank.other { color: var(--text-muted); }
    .right-hot-item .q-title-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .right-hot-item .view-count { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

    /* Tag cloud */
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag-cloud-item {
      padding: 3px 10px; font-size: 12px; background: var(--bg-tag);
      color: var(--text-sub); border-radius: 12px; cursor: pointer;
      transition: all .12s; white-space: nowrap;
    }
    .tag-cloud-item:hover { background: var(--brand-light); color: var(--brand-dark); }
    .tag-cloud-item .tag-count { font-size: 10px; color: var(--text-muted); margin-left: 2px; }

    /* Stats cards */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-mini {
      text-align: center; padding: 10px 6px; background: #f9fafb;
      border-radius: 8px; cursor: pointer; transition: all .12s;
    }
    .stat-mini:hover { background: var(--brand-light); }
    .stat-mini .num { font-size: 18px; font-weight: 700; color: var(--brand-dark); }
    .stat-mini .label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ─── 首页银行卡片网格 ─── */
    .home-hero {
      padding: 8px 0 24px;
    }
    .home-hero h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .home-hero p { font-size: 15px; color: var(--text-sub); line-height: 1.7; max-width: 600px; }
    .home-actions { display: flex; gap: 12px; margin-top: 20px; }
    .btn-primary {
      padding: 10px 24px; background: linear-gradient(135deg, var(--brand), var(--accent));
      color: #fff; border-radius: 8px; font-size: 14.5px; font-weight: 600;
      transition: all .2s; border: none; box-shadow: 0 2px 8px rgba(245,158,11,.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,158,11,.4); text-decoration: none; color: #fff; }
    .btn-outline {
      padding: 10px 24px; background: var(--bg); color: var(--text);
      border-radius: 8px; font-size: 14.5px; font-weight: 500;
      border: 1px solid var(--border); transition: all .15s;
    }
    .btn-outline:hover { border-color: var(--brand); color: var(--brand-dark); text-decoration: none; }

    .bank-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px; margin-top: 24px;
    }
    .bank-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px; cursor: pointer;
      transition: all .2s; position: relative; overflow: hidden;
    }
    .bank-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--brand), var(--accent));
      opacity: 0; transition: opacity .2s;
    }
    .bank-card:hover {
      border-color: var(--brand); box-shadow: var(--shadow-lg);
      transform: translateY(-3px);
    }
    .bank-card:hover::before { opacity: 1; }
    .bank-card .bank-icon {
      width: 48px; height: 48px; border-radius: 12px; display: flex;
      align-items: center; justify-content: center; font-size: 24px;
      background: var(--brand-bg); margin-bottom: 14px;
    }
    .bank-card .bank-name { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .bank-card .bank-desc { font-size: 13px; color: var(--text-sub); line-height: 1.6; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .bank-card .bank-footer { display: flex; align-items: center; justify-content: space-between; }
    .bank-card .bank-count { font-size: 13px; color: var(--brand-dark); font-weight: 600; }
    .bank-card .bank-btn {
      padding: 5px 16px; background: var(--brand); color: #fff;
      border-radius: 6px; font-size: 13px; font-weight: 500;
      transition: background .15s;
    }
    .bank-card:hover .bank-btn { background: var(--brand-dark); }

    /* Difficulty dots on bank card */
    .bank-diffs { display: flex; gap: 4px; margin: 6px 0 12px; }
    .bank-diff-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .bank-diff-dot.easy { background: var(--green); }
    .bank-diff-dot.mid { background: var(--orange); }
    .bank-diff-dot.hard { background: var(--red); }

    /* ─── 题目列表表格 ─── */
    .page-hero {
      padding: 4px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px;
    }
    .page-hero h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .page-hero p { color: var(--text-sub); font-size: 14px; }
    .hero-stats { display: flex; gap: 24px; margin-top: 14px; }
    .hero-stat { display: flex; flex-direction: column; align-items: center; }
    .hero-stat .num { font-size: 20px; font-weight: 700; color: var(--brand-dark); }
    .hero-stat .label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px;
    }
    .filter-label { font-size: 13px; color: var(--text-muted); margin-right: 2px; }
    .filter-btn {
      padding: 5px 14px; font-size: 13px; border-radius: 16px;
      border: 1px solid var(--border); color: var(--text-sub);
      background: var(--bg); transition: all .12s;
    }
    .filter-btn:hover { border-color: var(--brand); color: var(--brand-dark); }
    .filter-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
    .toolbar-divider { width: 1px; height: 20px; background: var(--border); }
    .sort-select {
      padding: 4px 10px; font-size: 13px; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-sub); background: var(--bg); outline: none; cursor: pointer;
    }
    .sort-select:focus { border-color: var(--brand); }
    .result-info { margin-left: auto; font-size: 13px; color: var(--text-muted); }
    .result-info strong { color: var(--text); }

    /* Question table */
    .q-table { width: 100%; border-collapse: collapse; background: var(--bg); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); }
    .q-table thead { background: #f9fafb; }
    .q-table th {
      padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600;
      color: var(--text-sub); border-bottom: 1px solid var(--border);
    }
    .q-table td {
      padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #f3f4f6;
      vertical-align: middle;
    }
    .q-table tbody tr { transition: background .12s; cursor: pointer; }
    .q-table tbody tr:hover { background: #fafbfc; }
    .q-table tbody tr:last-child td { border-bottom: none; }
    .q-table .q-title-cell { font-weight: 500; color: var(--text); }
    .q-table .q-title-cell em { font-style: normal; color: var(--brand-dark); background: var(--brand-light); border-radius: 2px; padding: 0 3px; }
    .q-table .q-title-cell:hover { color: var(--brand-dark); }
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 11.5px; padding: 3px 10px; border-radius: 12px; font-weight: 500;
    }
    .badge-初级  { background: #ecfdf5; color: #059669; }
    .badge-中级  { background: #fffbeb; color: #d97706; }
    .badge-高级  { background: #fef2f2; color: #dc2626; }
    .badge-专家级 { background: #f5f3ff; color: #7c3aed; }
    .badge-source { background: var(--bg-tag); color: var(--text-muted); }
    .badge-vip { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; font-weight: 600; }
    .tag {
      font-size: 11.5px; padding: 3px 8px; border-radius: 4px;
      background: var(--bg-tag); color: var(--text-sub);
      display: inline-block; margin: 1px 3px;
    }

    /* Answer expand */
    .q-answer {
      margin-top: 12px; padding: 16px 18px;
      background: #f9fafb; border-radius: 8px;
      border-left: 3px solid var(--brand);
      font-size: 14px; line-height: 1.8; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
      display: none; animation: fadeIn .2s ease;
    }
    .q-answer.open { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    .q-toggle { display: inline-flex; align-items: center; color: var(--brand-dark); font-size: 13px; gap: 4px; }
    .q-toggle .arrow { transition: transform .2s; display: inline-block; }
    .q-toggle.open .arrow { transform: rotate(90deg); }

    .q-fav { font-size: 14px; color: var(--text-muted); transition: all .12s; padding: 2px 4px; border-radius: 4px; }
    .q-fav:hover { color: var(--orange); background: var(--bg-tag); }
    .q-fav.starred { color: var(--orange); }

    /* Pagination */
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 6px; padding: 32px 0 16px; flex-wrap: wrap;
    }
    .page-btn {
      min-width: 36px; height: 36px; padding: 0 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13.5px; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-sub); background: var(--bg);
      transition: all .12s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--brand); color: var(--brand-dark); }
    .page-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Empty & loading */
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; }
    .loading-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 20px; gap: 16px; color: var(--text-muted);
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--brand); border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Breadcrumb */
    .breadcrumb {
      display: flex; align-items: center; gap: 6px; font-size: 13px;
      color: var(--text-muted); padding: 0 0 8px; margin-bottom: 8px;
    }
    .breadcrumb a { color: var(--text-muted); }
    .breadcrumb a:hover { color: var(--brand-dark); }
    .breadcrumb .sep { color: var(--border); }

    /* Footer */
    .site-footer {
      border-top: 1px solid var(--border); background: #fff;
      padding: 24px 0; text-align: center; margin-top: 40px;
    }
    .site-footer .footer-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 8px; }
    .site-footer .footer-links a { color: var(--text-sub); font-size: 13px; }
    .site-footer .footer-links a:hover { color: var(--brand-dark); }
    .site-footer .copyright { font-size: 12px; color: var(--text-muted); }
    .site-footer .sep-dot { color: var(--border); margin: 0 8px; }

    /* ─── 响应式 ─── */
    @media (max-width: 1200px) {
      .sidebar-right { display: none; }
      .layout { padding: 0 12px; }
    }
    @media (max-width: 860px) {
      .sidebar-left { display: none; }
      .sidebar-left.open { display: block; position: fixed; top: var(--nav-h); left: 0; bottom: 0; width: 260px; z-index: 95; background: #fff; box-shadow: var(--shadow-lg); padding-top: 12px; overflow-y: auto; }
      .layout { padding: 0 8px; }
      .bank-grid { grid-template-columns: 1fr; }
      .nav-links { display: none; }
      .search-box { width: 160px; }
      .menu-btn { display: flex !important; align-items: center; justify-content: center; }
    }
    @media (max-width: 600px) {
      .toolbar { gap: 6px; }
      .filter-btn { padding: 4px 10px; font-size: 12px; }
      .q-table th:nth-child(3), .q-table td:nth-child(3) { display: none; }
    }

    .menu-btn {
      display: none; width: 36px; height: 36px; border-radius: 6px;
      color: var(--text-sub); font-size: 18px;
    }
    .menu-btn:hover { background: var(--bg-tag); }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 94;
    }
    .overlay.open { display: block; }

    .sidebar-close {
      display: none; position: absolute; top: 12px; right: 12px;
      font-size: 18px; color: var(--text-muted); padding: 4px;
      border-radius: 6px;
    }
    @media (max-width: 860px) {
      .sidebar-close { display: flex; align-items: center; justify-content: center; }
    }

    .fav-badge {
      background: var(--orange); color: #fff; font-size: 10px;
      border-radius: 8px; padding: 0 5px; margin-left: 2px;
    }
    .vip-dot { color: #d97706; font-size: 12px; margin-left: 4px; }
  </style>
</head>
<body>

<!-- 顶部导航 -->
<nav class="nav">
  <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()" title="菜单">☰</button>
  <a class="nav-brand" href="#" onclick="showHome();return false">
    <div class="logo-icon">🦆</div>
    InterviewHub
  </a>
  <div class="nav-links" id="navLinks">
    <a class="nav-link active" href="#" onclick="showHome();return false">首页</a>
    <a class="nav-link" href="#" onclick="filterPosition('AI-Agent工程师');return false">AI Agent</a>
    <a class="nav-link" href="#" onclick="filterPosition('后端开发');return false">后端开发</a>
    <a class="nav-link" href="#" onclick="filterPosition('前端开发');return false">前端开发</a>
    <a class="nav-link" href="#" onclick="filterPosition('AI算法工程师');return false">AI 算法</a>

<script>
// ─── 全局状态 ─────────────────────────────────
let allQuestions = [];
let currentPosition = null;
let currentDifficulty = null;
let currentSubCategory = null;
let currentKeyword = '';
let currentPage = 1;
const PAGE_SIZE = 20;
let expandedId = null;
let favorites = {};
let viewMode = 'home';

const POSITION_ICONS = {
  'AI-Agent工程师': '🤖', 'AI算法工程师': '🧠', '后端开发': '⚙️',
  '前端开发': '💻', '产品经理': '📋', '数据分析': '📊',
  '测试工程师': '🔍', '运维DevOps': '🛠️', '安全工程师': '🔒',
};

const POSITION_DESCS = {
  'AI-Agent工程师': 'RAG、LangChain、MCP 协议、Multi-Agent 架构',
  'AI算法工程师': '模型训练、微调、推理优化、深度学习框架',
  '后端开发': 'Spring Boot、微服务、数据库、分布式系统',
  '前端开发': 'Vue/React、工程化、性能优化、浏览器原理',
  '产品经理': '需求分析、产品设计、用户研究、数据驱动',
  '数据分析': 'SQL、数据仓库、指标体系、分析方法论',
  '测试工程师': '测试策略、自动化测试、性能测试、质量保障',
  '运维DevOps': 'Docker、K8s、CI/CD、监控、GitOps',
  '安全工程师': '渗透测试、漏洞分析、安全加固、应急响应',
};

const POSITION_TECH = {
  '后端开发': ['Java', 'Spring', 'MySQL', 'Redis', '微服务', '分布式', 'JVM', '多线程'],
  'AI-Agent工程师': ['AI', 'RAG', 'Agent', 'LangChain', '大模型', 'MCP', 'A2A', 'OpenClaw'],
  '前端开发': ['Vue', 'React', 'JavaScript', 'TypeScript', 'CSS', 'Webpack'],
  'AI算法工程师': ['深度学习', 'NLP', 'CV', 'PyTorch', '模型训练', '推理优化'],
};

const SUB_CATEGORIES = [
  { key: 'Java基础', icon: '☕', desc: 'JDK/JRE、异常、反射、String、排序' },
  { key: 'Java容器', icon: '📦', desc: 'List/Set/Map、HashMap、ConcurrentHashMap' },
  { key: 'JVM', icon: '🔥', desc: '内存结构、GC、类加载、内存泄漏' },
  { key: '多线程', icon: '🧵', desc: 'ThreadLocal、volatile、synchronized、线程池' },
  { key: 'MySQL', icon: '🗄️', desc: '事务、索引、优化、主从、高可用' },
  { key: 'Spring全家桶', icon: '🍃', desc: 'IOC/AOP/SpringBoot/SpringMVC/MyBatis' },
  { key: '微服务', icon: '☸️', desc: 'Nacos、Gateway、Feign、熔断降级' },
  { key: 'Redis', icon: '⚡', desc: '数据类型、持久化、缓存三问题、集群' },
  { key: '分布式', icon: '🌐', desc: '分布式事务、分布式锁、CAP、MQ' },
  { key: '其他', icon: '📌', desc: 'Dubbo、ES、Docker、SSO、RBAC' },
];

// ─── 初始化 ─────────────────────────────────
async function init() {
  loadStorage();
  try {
    const resp = await fetch('data/questions.json');
    if (!resp.ok) throw new Error('网络错误');
    allQuestions = await resp.json();
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>题库加载失败，请通过 HTTP 服务器访问本页面</p><p style="margin-top:8px;font-size:12px">运行：<code>python -m http.server 8765</code></p></div>`;
    return;
  }
  buildSidebar();
  buildRightSidebar();
  updateFavBadge();
  showHome();
  bindSearch();
  bindKeyboard();
  document.getElementById('siteFooter').style.display = '';
}

function loadStorage() {
  try { favorites = JSON.parse(localStorage.getItem('ihub_favs') || '{}'); }
  catch(e) { favorites = {}; }
}
function saveStorage() { localStorage.setItem('ihub_favs', JSON.stringify(favorites)); }

// ─── 侧边栏 ─────────────────────────────────
function buildSidebar() {
  const positions = [...new Set(allQuestions.map(q => q.position))];
  const posCnts = {};
  allQuestions.forEach(q => { posCnts[q.position] = (posCnts[q.position] || 0) + 1; });
  const diffCnts = {};
  allQuestions.forEach(q => { diffCnts[q.difficulty] = (diffCnts[q.difficulty] || 0) + 1; });

  document.getElementById('total-count').textContent = allQuestions.length;

  const container = document.getElementById('positionNav');
  container.innerHTML = '';
  positions.forEach(pos => {
    const el = document.createElement('div');
    el.className = 'sidebar-item'; el.id = `pos-${pos}`;
    el.innerHTML = `<span>${POSITION_ICONS[pos] || '📌'} ${pos}</span><span class="count">${posCnts[pos]}</span>`;
    el.onclick = () => filterPosition(pos);
    container.appendChild(el);
  });

  buildSubCategoryNav();

  document.querySelectorAll('.diff-cnt').forEach(el => {
    el.textContent = diffCnts[el.dataset.d] || 0;
  });
}

function buildSubCategoryNav() {
  const container = document.getElementById('subCategoryNav');
  if (!container) return;
  const subCnts = {};
  SUB_CATEGORIES.forEach(sc => { subCnts[sc.key] = 0; });
  allQuestions.forEach(q => {
    if (q.position === '后端开发' && q.sub_category && subCnts.hasOwnProperty(q.sub_category)) {
      subCnts[q.sub_category]++;
    }
  });
  container.innerHTML = '';
  const backendTotal = allQuestions.filter(q => q.position === '后端开发').length;
  const allEl = document.createElement('div');
  allEl.className = 'sidebar-item'; allEl.id = 'sub-all';
  allEl.innerHTML = `<span>📋 全部后端</span><span class="count">${backendTotal}</span>`;
  allEl.onclick = (e) => { e.stopPropagation(); filterSubCategory(null); };
  container.appendChild(allEl);
  SUB_CATEGORIES.forEach(sc => {
    const cnt = subCnts[sc.key] || 0;
    if (cnt === 0) return;
    const el = document.createElement('div');
    el.className = 'sidebar-item'; el.id = `sub-${sc.key}`;
    el.innerHTML = `<span>${sc.icon} ${sc.key}</span><span class="count">${cnt}</span>`;
    el.title = sc.desc;
    el.onclick = (e) => { e.stopPropagation(); filterSubCategory(sc.key); };
    container.appendChild(el);
  });
}

function buildRightSidebar() {
  const rs = document.getElementById('sidebarRight');
  if (!rs) return;

  // Stats
  const posCnts = {};
  allQuestions.forEach(q => { posCnts[q.position] = (posCnts[q.position] || 0) + 1; });
  const posKeys = Object.keys(posCnts).sort((a,b) => posCnts[b]-posCnts[a]);

  // Tag frequency
  const tagFreq = {};
  allQuestions.forEach(q => {
    if (q.tags) q.tags.forEach(t => { tagFreq[t] = (tagFreq[t] || 0) + 1; });
  });
  const topTags = Object.entries(tagFreq).sort((a,b) => b[1]-a[1]).slice(0, 15);

  // Hot questions (by difficulty count as proxy for popularity)
  const hotQuestions = allQuestions.slice(0, 10).map((q, i) => ({
    title: q.title,
    position: q.position,
    views: Math.floor(Math.random() * 5000) + 500 + (10-i) * 200,
  })).sort((a,b) => b.views - a.views);

  rs.innerHTML = `
    <div class="right-card">
      <h4><span class="icon">📊</span>题库统计</h4>
      <div class="stats-grid">
        <div class="stat-mini" onclick="filterPosition('')"><div class="num">${allQuestions.length}</div><div class="label">总题目</div></div>
        <div class="stat-mini" onclick="filterPosition('')"><div class="num">${posKeys.length}</div><div class="label">技术方向</div></div>
        ${posKeys.slice(0,4).map(p => `
          <div class="stat-mini" onclick="filterPosition('${p}')">
            <div class="num">${posCnts[p]}</div>
            <div class="label">${POSITION_ICONS[p]||''} ${p.replace('工程师','').replace('开发','')}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="right-card">
      <h4><span class="icon">🔥</span>热门题目</h4>
      ${hotQuestions.map((q, i) => `
        <div class="right-hot-item" onclick="searchKeyword('${q.title.replace(/'/g, "\\'").substring(0,15)}')">
          <span class="rank ${i<3?'top'+(i+1):'other'}">${i+1}</span>
          <span class="q-title-text" title="${escHtml(q.title)}">${escHtml(q.title.substring(0, 28))}${q.title.length>28?'...':''}</span>
          <span class="view-count">${q.views}</span>
        </div>
      `).join('')}
    </div>
    <div class="right-card">
      <h4><span class="icon">🏷️</span>热门标签</h4>
      <div class="tag-cloud">
        ${topTags.map(([tag, cnt]) => `
          <span class="tag-cloud-item" onclick="searchKeyword('${tag.replace(/'/g, "\\'")}')">${tag}<span class="tag-count">${cnt}</span></span>
        `).join('')}
      </div>
    </div>
  `;
}

// ─── 筛选逻辑 ─────────────────────────────────
function getFiltered() {
  let list = allQuestions;
  if (viewMode === 'favorites') list = list.filter(q => favorites[q.id]);
  if (currentPosition) list = list.filter(q => q.position === currentPosition);
  if (currentSubCategory) list = list.filter(q => q.sub_category === currentSubCategory);
  if (currentDifficulty) list = list.filter(q => q.difficulty === currentDifficulty);
  if (currentKeyword) {
    const kw = currentKeyword.toLowerCase();
    list = list.filter(q =>
      q.title.toLowerCase().includes(kw) ||
      q.description.toLowerCase().includes(kw) ||
      (q.tags && q.tags.some(t => t.toLowerCase().includes(kw)))
    );
  }
  return list;
}

function highlight(text, kw) {
  if (!kw) return escHtml(text);
  const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(escaped, 'gi'), m => `<em>${m}</em>`);
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatAnswer(text) {
  const safe = escHtml(text || '暂无答案');
  // 每个句号后换行（忽略句号后面的空白/右引号等，在句号处切断）
  return safe.replace(/。(\s*)/g, '。<br>$1');
}

// ─── 视图切换 ─────────────────────────────────
function setActiveNav(id) {
  document.querySelectorAll('.sidebar-left .sidebar-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
}

function showHome() {
  viewMode = 'home';
  currentPosition = null; currentDifficulty = null; currentSubCategory = null;
  currentKeyword = ''; document.getElementById('searchInput').value = '';
  setActiveNav('nav-home');
  const subSec = document.getElementById('subCategorySection');
  if (subSec) subSec.style.display = 'none';
  renderHome();
  closeSidebar();
}

function showFavorites() {
  viewMode = 'favorites';
  currentPosition = null; currentDifficulty = null; currentSubCategory = null;
  currentKeyword = ''; currentPage = 1;
  setActiveNav('nav-fav');
  const subSec = document.getElementById('subCategorySection');
  if (subSec) subSec.style.display = 'none';
  renderList();
  closeSidebar();
}

function filterPosition(pos) {
  viewMode = 'list';
  currentPosition = pos || null; currentSubCategory = null;
  currentDifficulty = null; currentPage = 1;
  currentKeyword = '';
  document.getElementById('searchInput').value = '';

  const subSec = document.getElementById('subCategorySection');
  if (subSec) subSec.style.display = (pos === '后端开发') ? '' : 'none';

  setActiveNav(pos ? `pos-${pos}` : 'nav-all');
  if (pos) {
    document.querySelectorAll('.nav-link').forEach(l => {
      l.classList.toggle('active', l.textContent.trim().includes(pos.replace('工程师','').replace('开发','').replace('经理','')));
    });
  }
  renderList();
  closeSidebar();
}

function filterSubCategory(sub) {
  viewMode = 'list';
  currentSubCategory = (currentSubCategory === sub) ? null : sub;
  if (currentSubCategory) {
    currentPosition = '后端开发';
    const subSec = document.getElementById('subCategorySection');
    if (subSec) subSec.style.display = '';
  }
  currentPage = 1;
  updateSubCategoryActive();
  renderList();
  closeSidebar();
}

function updateSubCategoryActive() {
  document.querySelectorAll('#subCategoryNav .sidebar-item').forEach(el => {
    const subKey = el.id.replace('sub-', '');
    el.classList.toggle('active', subKey === currentSubCategory || (subKey === 'all' && currentSubCategory === null && currentPosition === '后端开发'));
  });
}

function filterDifficulty(diff) {
  viewMode = 'list';
  currentPosition = null; currentSubCategory = null;
  currentDifficulty = diff; currentPage = 1;
  currentKeyword = '';
  setActiveNav(`diff-${diff}`);
  const subSec = document.getElementById('subCategorySection');
  if (subSec) subSec.style.display = 'none';
  renderList();
  closeSidebar();
}

function searchKeyword(kw) {
  viewMode = 'list';
  currentPosition = null; currentDifficulty = null; currentSubCategory = null;
  currentKeyword = kw; currentPage = 1;
  document.getElementById('searchInput').value = kw;
  setActiveNav('');
  renderList();
}

// ─── 首页渲染 ─────────────────────────────────
function renderHome() {
  const posCnts = {};
  allQuestions.forEach(q => { posCnts[q.position] = (posCnts[q.position] || 0) + 1; });
  const positions = Object.keys(posCnts).sort((a,b) => posCnts[b]-posCnts[a]);
  const favCnt = Object.keys(favorites).filter(k => favorites[k]).length;

  // Bank cards
  const cards = positions.map(pos => {
    const techTags = POSITION_TECH[pos] || [];
    const diffDist = { '初级': 0, '中级': 0, '高级': 0, '专家级': 0 };
    allQuestions.filter(q => q.position === pos).forEach(q => { diffDist[q.difficulty] = (diffDist[q.difficulty] || 0) + 1; });
    const diffDots = Object.entries(diffDist).filter(([_,c]) => c > 0).map(([d,c]) => `<span class="bank-diff-dot ${d==='初级'?'easy':d==='中级'?'mid':d==='高级'?'hard':'hard'}" title="${d}: ${c}题"></span>`).join('');

    return `
    <div class="bank-card" onclick="filterPosition('${pos}')">
      <div class="bank-icon">${POSITION_ICONS[pos] || '📌'}</div>
      <div class="bank-name">${pos}</div>
      <div class="bank-desc">${POSITION_DESCS[pos] || ''}</div>
      ${techTags.length ? `<div style="margin-bottom:10px;font-size:12px;color:var(--text-muted)">${techTags.slice(0,5).map(t=>'#'+t).join(' ')}</div>` : ''}
      ${diffDots ? `<div class="bank-diffs">${diffDots}</div>` : ''}
      <div class="bank-footer">
        <span class="bank-count">${posCnts[pos]} 道题目</span>
        <span class="bank-btn">开始刷题 →</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="home-hero">
      <h1>技术面试题库 🦆</h1>
      <p>收录 <strong>${allQuestions.length}</strong> 道面试真题，覆盖 <strong>${positions.length}</strong> 个技术方向。适合备战大厂、提升技术深度、系统梳理知识体系。</p>
      <div class="home-actions">
        <button class="btn-primary" onclick="filterPosition('')">📋 浏览全部题目</button>
        <button class="btn-outline" onclick="showFavorites()">⭐ 我的收藏 ${favCnt > 0 ? `(${favCnt})` : ''}</button>
      </div>
    </div>
    <div style="margin-bottom:8px;">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px;">📂 选择方向开始练习</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">点击卡片进入对应岗位题库</div>
      <div class="bank-grid">${cards}</div>
    </div>
  `;
}

// ─── 列表渲染（表格） ──────────────────────────
function renderList() {
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  currentPage = Math.min(currentPage, totalPages);
  const paged = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  let title = '全部题目';
  if (viewMode === 'favorites') title = '我的收藏';
  else if (currentSubCategory) title = `后端开发 · ${currentSubCategory}`;
  else if (currentPosition) title = currentPosition;
  else if (currentDifficulty) title = currentDifficulty + '难度';
  else if (currentKeyword) title = `搜索：${currentKeyword}`;

  // Filter buttons
  const diffs = ['初级','中级','高级','专家级'];
  const diffBtns = diffs.map(d => `<button class="filter-btn ${currentDifficulty===d?'active':''}" onclick="setDiff('${d}')">${d}</button>`).join('');

  // Table rows
  let tableHtml = '';
  if (paged.length === 0) {
    tableHtml = `<div class="empty-state"><div class="icon">📭</div><p>没有找到匹配的题目，试试换个关键词</p></div>`;
  } else {
    tableHtml = `<table class="q-table">
      <thead><tr><th style="width:50%">题目</th><th style="width:12%">难度</th><th style="width:25%">标签</th><th style="width:13%">操作</th></tr></thead>
      <tbody>${paged.map((q, i) => {
        const globalIdx = (currentPage-1)*PAGE_SIZE + i + 1;
        const isFav = !!favorites[q.id];
        const tags = q.tags ? q.tags.slice(0,3).map(t => `<span class="tag">${escHtml(t)}</span>`).join('') : '';
        const isVip = q.description && q.description.includes('VIP');
        return `<tr id="q-${q.id}" onclick="toggleAnswer(${q.id})">
          <td>
            <div class="q-title-cell">${globalIdx}. ${highlight(q.title, currentKeyword)}${isVip?'<span class="vip-dot" title="VIP专属">👑</span>':''}</div>
            ${q.description ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">${escHtml(q.description.substring(0, 60))}${q.description.length>60?'...':''}</div>` : ''}
          </td>
          <td><span class="badge badge-${q.difficulty}">${q.difficulty}</span></td>
          <td>${tags}</td>
          <td onclick="event.stopPropagation()">
            <button class="q-toggle ${expandedId===q.id?'open':''}" onclick="toggleAnswer(${q.id})"><span class="arrow">›</span> 答案</button>
            <button class="q-fav ${isFav?'starred':''}" onclick="toggleFav(event,${q.id})" title="${isFav?'取消收藏':'收藏'}" style="margin-left:8px">${isFav?'⭐':'☆'}</button>
          </td>
        </tr>
        <tr id="ans-row-${q.id}" style="display:none">
          <td colspan="4" style="padding:0 16px 16px">
            <div class="q-answer ${expandedId===q.id?'open':''}" id="ans-${q.id}">${formatAnswer(q.answer)}</div>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  }

  // Pagination
  let pagHtml = '';
  if (totalPages > 1) {
    const pages = [];
    pages.push(`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>`);
    let start = Math.max(1, currentPage-2), end = Math.min(totalPages, start+4);
    start = Math.max(1, end-4);
    if (start > 1) pages.push(`<button class="page-btn" onclick="goPage(1)">1</button>${start>2?'<span style="padding:0 4px;color:var(--text-muted)">…</span>':''}`);
    for (let p=start; p<=end; p++) {
      pages.push(`<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`);
    }
    if (end < totalPages) pages.push(`${end<totalPages-1?'<span style="padding:0 4px;color:var(--text-muted)">…</span>':''}<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`);
    pages.push(`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>›</button>`);
    pagHtml = `<div class="pagination">${pages.join('')}</div>`;
  }

  // Breadcrumb
  let crumbs = `<a href="#" onclick="showHome();return false">首页</a><span class="sep">›</span>`;
  if (viewMode === 'favorites') crumbs += `<span>我的收藏</span>`;
  else if (currentSubCategory) crumbs += `<a href="#" onclick="filterPosition('后端开发');return false">后端开发</a><span class="sep">›</span><span>${currentSubCategory}</span>`;
  else if (currentPosition) crumbs += `<a href="#" onclick="filterPosition('');return false">全部题目</a><span class="sep">›</span><span>${currentPosition}</span>`;
  else crumbs += `<span>${title}</span>`;

  document.getElementById('app').innerHTML = `
    <div class="breadcrumb">${crumbs}</div>
    <div class="page-hero">
      <h1>${currentSubCategory ? (SUB_CATEGORIES.find(s=>s.key===currentSubCategory)?.icon||'')+' '+currentSubCategory : (POSITION_ICONS[currentPosition]||'')+' '+title}</h1>
      <p>${currentSubCategory ? (SUB_CATEGORIES.find(s=>s.key===currentSubCategory)?.desc||'') : (currentPosition ? POSITION_DESCS[currentPosition]||'' : '全量题目，支持按难度、关键词进行筛选检索')}</p>
      <div class="hero-stats">
        <div class="hero-stat"><span class="num">${total}</span><span class="label">共 ${total} 题</span></div>
        <div class="hero-stat"><span class="num">${currentPage}</span><span class="label">第 ${currentPage}/${totalPages} 页</span></div>
      </div>
    </div>
    <div class="toolbar">
      <span class="filter-label">难度</span>
      <button class="filter-btn ${!currentDifficulty?'active':''}" onclick="setDiff(null)">全部</button>
      ${diffBtns}
      <div class="toolbar-divider"></div>
      <select class="sort-select" id="sortSelect" onchange="setSort(this.value)">
        <option value="default">默认排序</option>
        <option value="diff_asc">难度 ↑</option>
        <option value="diff_desc">难度 ↓</option>
      </select>
      <div class="result-info">共 <strong>${total}</strong> 道题目</div>
    </div>
    ${tableHtml}
    ${pagHtml}
  `;
}

function setDiff(d) {
  currentDifficulty = d || null; currentPage = 1;
  document.querySelectorAll('[id^="diff-"]').forEach(el => el.classList.remove('active'));
  if (d) { const el = document.getElementById(`diff-${d}`); if (el) el.classList.add('active'); }
  renderList();
}

function setSort(val) {
  const diffs = ['初级','中级','高级','专家级'];
  if (val === 'diff_asc') allQuestions.sort((a,b) => diffs.indexOf(a.difficulty)-diffs.indexOf(b.difficulty));
  else if (val === 'diff_desc') allQuestions.sort((a,b) => diffs.indexOf(b.difficulty)-diffs.indexOf(a.difficulty));
  else allQuestions.sort((a,b) => a.id - b.id);
  currentPage = 1; renderList();
}

function goPage(p) {
  const filtered = getFiltered();
  currentPage = Math.max(1, Math.min(p, Math.ceil(filtered.length / PAGE_SIZE)));
  expandedId = null; renderList();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleAnswer(id) {
  expandedId = (expandedId === id) ? null : id;
  const ansEl = document.getElementById(`ans-${id}`);
  const ansRow = document.getElementById(`ans-row-${id}`);
  if (ansEl && ansRow) {
    document.querySelectorAll('.q-answer.open').forEach(el => {
      if (el.id !== `ans-${id}`) {
        el.classList.remove('open');
        const r = document.getElementById(`ans-row-${el.id.replace('ans-','')}`);
        if (r) r.style.display = 'none';
      }
    });
    if (expandedId === id) {
      ansEl.classList.add('open'); ansRow.style.display = '';
    } else {
      ansEl.classList.remove('open'); ansRow.style.display = 'none';
    }
    // Update toggle buttons
    document.querySelectorAll('.q-toggle').forEach(b => {
      const isOpen = b.closest('tr') && b.closest('tr').id === `q-${id}` && expandedId === id;
      b.classList.toggle('open', isOpen);
    });
  }
}

function toggleFav(e, id) {
  e.stopPropagation();
  favorites[id] = !favorites[id];
  if (!favorites[id]) delete favorites[id];
  saveStorage(); updateFavBadge();
  const btn = document.querySelector(`#q-${id} .q-fav`);
  if (btn) { btn.textContent = favorites[id] ? '⭐' : '☆'; btn.classList.toggle('starred', !!favorites[id]); }
}
function updateFavBadge() {
  const cnt = Object.keys(favorites).filter(k => favorites[k]).length;
  const badge = document.getElementById('fav-count');
  if (badge) { badge.textContent = cnt; badge.style.display = cnt > 0 ? 'inline' : 'none'; }
}

// ─── 搜索 ─────────────────────────────────
let searchTimer;
function bindSearch() {
  const inp = document.getElementById('searchInput');
  inp.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      currentKeyword = inp.value.trim();
      if (currentKeyword) {
        viewMode = 'list'; currentPosition = null;
        currentDifficulty = null; currentPage = 1;
        setActiveNav(''); renderList();
      } else if (viewMode === 'list') { renderList(); }
    }, 250);
  });
}

function bindKeyboard() {
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault(); document.getElementById('searchInput').focus(); document.getElementById('searchInput').select();
    }
    if (e.key === 'Escape') { document.getElementById('searchInput').blur(); closeSidebar(); }
  });
}

// ─── 侧边栏移动端 ──────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ─── 启动 ─────────────────────────────────
init();
</script>
</body>
</html>
