<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InterviewHub · 技术面试题库</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>📚</text></svg>">
  <style>
    /* ─── CSS 变量 ─── */
    :root {
      --brand:        #3c6ef0;
      --brand-light:  #e8effe;
      --brand-dark:   #2851c8;
      --bg:           #ffffff;
      --bg-sidebar:   #f8f9fb;
      --bg-tag:       #f0f2f5;
      --border:       #e8eaed;
      --text:         #2c3e50;
      --text-sub:     #6b7785;
      --text-muted:   #9ba5b0;
      --green:        #18a058;
      --orange:       #f0a020;
      --red:          #d03050;
      --purple:       #722ed1;
      --nav-h:        56px;
      --sidebar-w:    260px;
      --content-max:  860px;
      --radius:       6px;
      --shadow-sm:    0 1px 4px rgba(0,0,0,.06);
      --shadow-md:    0 4px 16px rgba(0,0,0,.10);
    }

    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                   'Microsoft YaHei', sans-serif;
      color: var(--text); background: var(--bg);
      line-height: 1.7; min-height: 100vh;
    }
    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }
    ul, ol { list-style: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; }

    /* ─── 顶部导航 ─── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
      background: var(--bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px;
      z-index: 100; gap: 0;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 17px; font-weight: 700; color: var(--text);
      text-decoration: none; white-space: nowrap; margin-right: 28px;
    }
    .nav-brand:hover { text-decoration: none; color: var(--brand); }
    .nav-brand .logo-icon {
      width: 32px; height: 32px; background: var(--brand);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 17px; color: #fff;
    }
    .nav-links {
      display: flex; gap: 4px; flex: 1; align-items: center;
    }
    .nav-link {
      padding: 6px 12px; border-radius: var(--radius); font-size: 14px;
      color: var(--text-sub); transition: all .15s; white-space: nowrap;
    }
    .nav-link:hover { background: var(--bg-tag); color: var(--text); text-decoration: none; }
    .nav-link.active { background: var(--brand-light); color: var(--brand); font-weight: 600; }

    .nav-right { display: flex; align-items: center; gap: 12px; }
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-sidebar); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px; width: 220px;
      transition: all .15s;
    }
    .search-box:focus-within {
      background: #fff; border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(60,110,240,.12);
      width: 260px;
    }
    .search-box input {
      border: none; outline: none; background: none;
      font-size: 13px; color: var(--text); flex: 1; min-width: 0;
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-icon { color: var(--text-muted); font-size: 14px; flex-shrink: 0; }
    .kbd { 
      font-size: 11px; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 1px 5px; font-family: monospace; background: var(--bg);
    }
    .nav-github {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 13px; color: var(--text-sub);
      transition: all .15s;
    }
    .nav-github:hover { border-color: var(--text); color: var(--text); text-decoration: none; }

    /* ─── 布局容器 ─── */
    .layout {
      margin-top: var(--nav-h);
      display: flex; min-height: calc(100vh - var(--nav-h));
    }

    /* ─── 左侧边栏 ─── */
    .sidebar {
      position: fixed; top: var(--nav-h); bottom: 0; left: 0;
      width: var(--sidebar-w); overflow-y: auto;
      background: var(--bg-sidebar); border-right: 1px solid var(--border);
      padding: 16px 0; z-index: 90;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sidebar-section { margin-bottom: 4px; }
    .sidebar-heading {
      padding: 6px 20px 4px; font-size: 11px; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: .08em;
    }
    .sidebar-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 20px; font-size: 13.5px; color: var(--text-sub);
      cursor: pointer; transition: all .12s; border-radius: 0;
      border-left: 2px solid transparent;
    }
    .sidebar-item:hover { background: rgba(0,0,0,.04); color: var(--text); }
    .sidebar-item.active {
      background: var(--brand-light); color: var(--brand);
      border-left-color: var(--brand); font-weight: 600;
    }
    .sidebar-item .count {
      font-size: 11px; background: var(--bg-tag);
      color: var(--text-muted); border-radius: 10px;
      padding: 1px 7px; min-width: 22px; text-align: center;
    }
    .sidebar-item.active .count { background: rgba(60,110,240,.15); color: var(--brand); }

    .sidebar-sub { padding-left: 8px; }
    .sidebar-sub .sidebar-item { padding-left: 28px; font-size: 13px; }
    .sidebar-item.sidebar-sub { padding-left: 28px; font-size: 13px; }
    .sidebar-item.sidebar-sub:hover { background: rgba(60,110,240,.06); }
    .sidebar-item.sidebar-sub.active { background: var(--brand-light); color: var(--brand); font-weight: 600; }

    .sidebar-divider { height: 1px; background: var(--border); margin: 8px 16px; }

    /* ─── 主内容区 ─── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1; min-width: 0; padding: 0 32px 80px;
    }

    /* ─── 页面头部 ─── */
    .page-hero {
      padding: 36px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 28px;
    }
    .page-hero h1 {
      font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 8px;
    }
    .page-hero p { color: var(--text-sub); font-size: 14.5px; }
    .hero-stats {
      display: flex; gap: 24px; margin-top: 16px;
    }
    .hero-stat {
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
    }
    .hero-stat .num {
      font-size: 22px; font-weight: 700; color: var(--brand);
    }
    .hero-stat .label {
      font-size: 12px; color: var(--text-muted); margin-top: 2px;
    }

    /* ─── 筛选工具栏 ─── */
    .toolbar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 14px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
    }
    .filter-label { font-size: 13px; color: var(--text-muted); margin-right: 4px; }
    .filter-btn {
      padding: 4px 12px; font-size: 13px; border-radius: 14px;
      border: 1px solid var(--border); color: var(--text-sub);
      background: var(--bg); transition: all .12s;
    }
    .filter-btn:hover { border-color: var(--brand); color: var(--brand); }
    .filter-btn.active {
      background: var(--brand); color: #fff; border-color: var(--brand);
    }
    .toolbar-divider { width: 1px; height: 20px; background: var(--border); }
    .sort-select {
      padding: 4px 10px; font-size: 13px; border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text-sub); background: var(--bg);
      outline: none; cursor: pointer;
    }
    .sort-select:focus { border-color: var(--brand); }
    .result-info { margin-left: auto; font-size: 13px; color: var(--text-muted); }
    .result-info strong { color: var(--text); }

    /* ─── 题目列表 ─── */
    .question-list { display: flex; flex-direction: column; gap: 0; }

    .q-item {
      border-bottom: 1px solid var(--border); padding: 16px 0;
      transition: background .12s;
    }
    .q-item:last-child { border-bottom: none; }

    .q-header {
      display: flex; align-items: flex-start; gap: 12px; cursor: pointer;
    }
    .q-index {
      font-size: 12px; color: var(--text-muted); min-width: 28px;
      padding-top: 2px; flex-shrink: 0;
    }
    .q-title-area { flex: 1; min-width: 0; }
    .q-title {
      font-size: 15px; font-weight: 600; color: var(--text);
      line-height: 1.5; margin-bottom: 6px;
    }
    .q-title em { font-style: normal; color: var(--brand); background: var(--brand-light); border-radius: 2px; padding: 0 2px; }
    .q-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 11.5px; padding: 2px 8px; border-radius: 10px;
      font-weight: 500;
    }
    .badge-初级  { background: #e8f4ec; color: var(--green); }
    .badge-中级  { background: #fff3e0; color: var(--orange); }
    .badge-高级  { background: #ffeef0; color: var(--red); }
    .badge-专家级 { background: #f3e8ff; color: var(--purple); }
    .badge-source { background: var(--bg-tag); color: var(--text-muted); }

    .tag {
      font-size: 11.5px; padding: 2px 8px; border-radius: 4px;
      background: var(--bg-tag); color: var(--text-sub);
    }

    .q-toggle {
      display: flex; align-items: center; padding: 3px 6px;
      border-radius: var(--radius); color: var(--text-muted);
      font-size: 13px; transition: all .12s; flex-shrink: 0;
    }
    .q-toggle:hover { background: var(--bg-tag); color: var(--text); }
    .q-toggle .arrow { transition: transform .2s; display: inline-block; }
    .q-toggle.open .arrow { transform: rotate(90deg); }

    /* ─── 答案区 ─── */
    .q-answer {
      margin-top: 14px; padding: 16px 18px;
      background: var(--bg-sidebar); border-radius: var(--radius);
      border-left: 3px solid var(--brand);
      font-size: 14px; line-height: 1.8; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
      display: none;
    }
    .q-answer.open { display: block; animation: fadeIn .2s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    /* ─── 收藏按钮 ─── */
    .q-fav {
      padding: 3px 6px; border-radius: var(--radius);
      font-size: 14px; color: var(--text-muted);
      transition: all .12s; flex-shrink: 0;
    }
    .q-fav:hover { background: var(--bg-tag); color: var(--orange); }
    .q-fav.starred { color: var(--orange); }

    /* ─── 分页 ─── */
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 6px; padding: 32px 0 16px; flex-wrap: wrap;
    }
    .page-btn {
      min-width: 34px; height: 34px; padding: 0 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13.5px; border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text-sub);
      background: var(--bg); transition: all .12s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
    .page-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ─── 空状态 ─── */
    .empty-state {
      text-align: center; padding: 80px 20px; color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; }

    /* ─── Loading ─── */
    .loading-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 20px; gap: 16px; color: var(--text-muted);
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--brand); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── 快速标签 ─── */
    .hot-tags {
      display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 20px;
    }
    .hot-tag {
      padding: 4px 12px; border: 1px solid var(--border);
      border-radius: 14px; font-size: 12.5px; color: var(--text-sub);
      background: var(--bg); transition: all .12s; cursor: pointer;
    }
    .hot-tag:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-light); }

    /* ─── 目录页 Hero ─── */
    .home-hero {
      padding: 48px 0 36px;
    }
    .home-hero h1 { font-size: 30px; font-weight: 800; margin-bottom: 10px; }
    .home-hero p { font-size: 15.5px; color: var(--text-sub); max-width: 560px; line-height: 1.7; }
    .home-actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-primary {
      padding: 10px 22px; background: var(--brand); color: #fff;
      border-radius: var(--radius); font-size: 14.5px; font-weight: 600;
      transition: background .15s; border: none;
    }
    .btn-primary:hover { background: var(--brand-dark); color: #fff; text-decoration: none; }
    .btn-outline {
      padding: 10px 22px; background: var(--bg); color: var(--text);
      border-radius: var(--radius); font-size: 14.5px; font-weight: 500;
      border: 1px solid var(--border); transition: all .15s;
    }
    .btn-outline:hover { border-color: var(--brand); color: var(--brand); text-decoration: none; }

    /* 目录卡片 */
    .cat-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px; margin-top: 32px;
    }
    .cat-card {
      border: 1px solid var(--border); border-radius: 10px;
      padding: 20px 22px; cursor: pointer; transition: all .15s;
      background: var(--bg);
    }
    .cat-card:hover { border-color: var(--brand); box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .cat-card .icon { font-size: 28px; margin-bottom: 10px; display: block; }
    .cat-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
    .cat-card p { font-size: 12.5px; color: var(--text-muted); }
    .cat-card .total { font-size: 13px; color: var(--brand); font-weight: 600; margin-top: 8px; }

    /* ─── 响应式 ─── */
    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); transition: transform .25s; }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 0 16px 60px; }
      .nav-links { display: none; }
      .search-box { width: 160px; }
      .menu-btn { display: flex !important; }
      .hero-stats { gap: 16px; }
    }
    @media (max-width: 600px) {
      .toolbar { gap: 6px; }
      .filter-btn { padding: 3px 8px; font-size: 12px; }
    }

    .menu-btn {
      display: none; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: var(--radius);
      color: var(--text-sub); font-size: 18px;
    }
    .menu-btn:hover { background: var(--bg-tag); }

    /* 遮罩层 */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.3); z-index: 89;
    }
    .overlay.open { display: block; }

    /* 面包屑 */
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text-muted); padding: 14px 0 0;
    }
    .breadcrumb a { color: var(--text-muted); }
    .breadcrumb a:hover { color: var(--brand); }
    .breadcrumb .sep { color: var(--border); }

    /* 侧边栏移动端关闭按钮 */
    .sidebar-close {
      display: none; position: absolute; top: 12px; right: 12px;
      font-size: 18px; color: var(--text-muted); padding: 4px;
      border-radius: var(--radius);
    }
    @media (max-width: 900px) {
      .sidebar-close { display: flex; align-items: center; justify-content: center; }
    }

    /* 高亮 */
    mark { background: #fff3a3; color: inherit; border-radius: 2px; }

    /* 收藏夹数量角标 */
    .fav-badge {
      background: var(--orange); color: #fff; font-size: 10px;
      border-radius: 8px; padding: 0 5px; margin-left: 2px;
    }
  </style>
</head>
<body>

<!-- 顶部导航 -->
<nav class="nav">
  <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()" title="菜单">☰</button>
  <a class="nav-brand" href="#">
    <div class="logo-icon">📚</div>
    InterviewHub
  </a>
  <div class="nav-links" id="navLinks">
    <a class="nav-link" href="#" onclick="showHome(); return false;">首页</a>
    <a class="nav-link" href="#" onclick="filterPosition('AI-Agent工程师'); return false;">AI Agent</a>
    <a class="nav-link" href="#" onclick="filterPosition('后端开发'); return false;">后端开发</a>
    <a class="nav-link" href="#" onclick="filterPosition('前端开发'); return false;">前端开发</a>
    <a class="nav-link" href="#" onclick="filterPosition('AI算法工程师'); return false;">AI 算法</a>
    <a class="nav-link" href="#" onclick="filterPosition('产品经理'); return false;">产品经理</a>
  </div>
  <div class="nav-right">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索题目..." autocomplete="off">
      <kbd class="kbd">⌘K</kbd>
    </div>
    <a class="nav-github" href="https://github.com/Snailclimb/JavaGuide" target="_blank" rel="noopener">

      GitHub

  </div>
</nav>

<!-- 遮罩层 -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">

  <!-- 左侧目录 -->
  <aside class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="closeSidebar()">✕</button>

    <div class="sidebar-section">
      <div class="sidebar-heading">快捷入口</div>
      <div class="sidebar-item" onclick="showHome()" id="nav-home">
        <span>🏠 首页</span>
      </div>
      <div class="sidebar-item" onclick="filterPosition('')" id="nav-all">
        <span>📋 全部题目</span>
        <span class="count" id="total-count">204</span>
      </div>
      <div class="sidebar-item" onclick="showFavorites()" id="nav-fav">
        <span>⭐ 我的收藏</span>
        <span class="count fav-badge" id="fav-count" style="display:none"></span>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <div class="sidebar-heading">按岗位浏览</div>
      <div id="positionNav"><!-- 动态生成 --></div>
    </div>

    <div id="subCategorySection" class="sidebar-section" style="display:none">
      <div class="sidebar-heading">后端开发子分类</div>
      <div id="subCategoryNav"></div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <div class="sidebar-heading">按难度筛选</div>
      <div class="sidebar-item" onclick="filterDifficulty('初级')" id="diff-初级">
        <span>🟢 初级</span><span class="count diff-cnt" data-d="初级"></span>
      </div>
      <div class="sidebar-item" onclick="filterDifficulty('中级')" id="diff-中级">
        <span>🟡 中级</span><span class="count diff-cnt" data-d="中级"></span>
      </div>
      <div class="sidebar-item" onclick="filterDifficulty('高级')" id="diff-高级">
        <span>🔴 高级</span><span class="count diff-cnt" data-d="高级"></span>
      </div>
      <div class="sidebar-item" onclick="filterDifficulty('专家级')" id="diff-专家级">
        <span>🟣 专家级</span><span class="count diff-cnt" data-d="专家级"></span>
      </div>
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="main" id="main">
    <div id="app">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>题库加载中...</p>
      </div>
    </div>
  </main>

</div>

<script>
// ─── 全局状态 ─────────────────────────────────
let allQuestions = [];
let currentPosition = null;   // null = 全部
let currentDifficulty = null;
let currentSubCategory = null; // 后端开发子分类
let currentKeyword = '';
let currentPage = 1;
const PAGE_SIZE = 20;
let expandedId = null;
let favorites = {};
let viewMode = 'home'; // 'home' | 'list' | 'favorites'

const POSITION_ICONS = {
  'AI-Agent工程师': '🤖',
  'AI算法工程师':   '🧠',
  '后端开发':       '⚙️',
  '前端开发':       '💻',
  '产品经理':       '📋',
  '数据分析':       '📊',
  '测试工程师':     '🔍',
  '运维DevOps':     '🛠️',
  '安全工程师':     '🔒',
};

const POSITION_DESCS = {
  'AI-Agent工程师': 'RAG、LangChain、MCP 协议、Multi-Agent 架构',
  'AI算法工程师':   '模型训练、微调、推理优化、深度学习框架',
  '后端开发':       'Spring Boot、微服务、数据库、分布式系统',
  '前端开发':       'Vue/React、工程化、性能优化、浏览器原理',
  '产品经理':       '需求分析、产品设计、用户研究、数据驱动',
  '数据分析':       'SQL、数据仓库、指标体系、分析方法论',
  '测试工程师':     '测试策略、自动化测试、性能测试、质量保障',
  '运维DevOps':     'Docker、K8s、CI/CD、监控、GitOps',
  '安全工程师':     '渗透测试、漏洞分析、安全加固、应急响应',
};

const SUB_CATEGORIES = [
  { key: 'Java基础',    icon: '☕', desc: 'JDK/JRE、异常、反射、String、排序' },
  { key: 'Java容器',    icon: '📦', desc: 'List/Set/Map、HashMap、ConcurrentHashMap' },
  { key: 'JVM',         icon: '🔥', desc: '内存结构、GC、类加载、内存泄漏' },
  { key: '多线程',       icon: '🧵', desc: 'ThreadLocal、volatile、synchronized、线程池' },
  { key: 'MySQL',       icon: '🗄️', desc: '事务、索引、优化、主从、高可用' },
  { key: 'Spring全家桶', icon: '🍃', desc: 'IOC/AOP/SpringBoot/SpringMVC/MyBatis' },
  { key: '微服务',       icon: '☸️', desc: 'Nacos、Gateway、Feign、熔断降级' },
  { key: 'Redis',       icon: '⚡', desc: '数据类型、持久化、缓存三问题、集群' },
  { key: '分布式',       icon: '🌐', desc: '分布式事务、分布式锁、CAP、MQ' },
  { key: '其他',         icon: '📌', desc: 'Dubbo、ES、Docker、SSO、RBAC' },
];

// ─── 初始化 ─────────────────────────────────
async function init() {
  loadStorage();
  try {
    const resp = await fetch('data/questions.json');
    if (!resp.ok) throw new Error('网络错误');
    allQuestions = await resp.json();
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <p>题库加载失败，请通过 HTTP 服务器访问本页面</p>
        <p style="margin-top:8px;font-size:12px">运行：<code>python -m http.server 8765</code></p>
      </div>`;
    return;
  }

  buildSidebar();
  updateFavBadge();
  showHome();
  bindSearch();
  bindKeyboard();
}

function loadStorage() {
  try {
    favorites = JSON.parse(localStorage.getItem('ihub_favs') || '{}');
  } catch(e) { favorites = {}; }
}
function saveStorage() {
  localStorage.setItem('ihub_favs', JSON.stringify(favorites));
}

// ─── 侧边栏构建 ──────────────────────────────
function buildSidebar() {
  const positions = [...new Set(allQuestions.map(q => q.position))];
  const posCnts = {};
  allQuestions.forEach(q => { posCnts[q.position] = (posCnts[q.position] || 0) + 1; });
  const diffCnts = {};
  allQuestions.forEach(q => { diffCnts[q.difficulty] = (diffCnts[q.difficulty] || 0) + 1; });

  document.getElementById('total-count').textContent = allQuestions.length;

  // 位置导航
  const container = document.getElementById('positionNav');
  positions.forEach(pos => {
    const el = document.createElement('div');
    el.className = 'sidebar-item';
    el.id = `pos-${pos}`;
    el.innerHTML = `<span>${POSITION_ICONS[pos] || '📌'} ${pos}</span><span class="count">${posCnts[pos]}</span>`;
    el.onclick = () => filterPosition(pos);
    container.appendChild(el);
  });

  // 子分类导航（后端开发）
  buildSubCategoryNav();

  // 难度计数
  document.querySelectorAll('.diff-cnt').forEach(el => {
    el.textContent = diffCnts[el.dataset.d] || 0;
  });
}

function buildSubCategoryNav() {
  const container = document.getElementById('subCategoryNav');
  if (!container) return;
  
  // 统计各子分类数量（仅后端开发）
  const subCnts = {};
  SUB_CATEGORIES.forEach(sc => { subCnts[sc.key] = 0; });
  allQuestions.forEach(q => {
    if (q.position === '后端开发' && q.sub_category && subCnts.hasOwnProperty(q.sub_category)) {
      subCnts[q.sub_category]++;
    }
  });

  container.innerHTML = '';
  
  // "全部" 选项
  const backendTotal = allQuestions.filter(q => q.position === '后端开发').length;
  const allEl = document.createElement('div');
  allEl.className = 'sidebar-item sidebar-sub';
  allEl.id = 'sub-all';
  allEl.innerHTML = `<span>📋 全部后端</span><span class="count">${backendTotal}</span>`;
  allEl.onclick = (e) => { e.stopPropagation(); filterSubCategory(null); };
  container.appendChild(allEl);

  SUB_CATEGORIES.forEach(sc => {
    const cnt = subCnts[sc.key] || 0;
    if (cnt === 0) return; // 跳过无题目的分类
    const el = document.createElement('div');
    el.className = 'sidebar-item sidebar-sub';
    el.id = `sub-${sc.key}`;
    el.innerHTML = `<span>${sc.icon} ${sc.key}</span><span class="count">${cnt}</span>`;
    el.title = sc.desc;
    el.onclick = (e) => { e.stopPropagation(); filterSubCategory(sc.key); };
    container.appendChild(el);
  });
}

function filterSubCategory(sub) {
  viewMode = 'list';
  currentSubCategory = (currentSubCategory === sub) ? null : sub;
  currentPage = 1;
  updateSubCategoryActive();
  renderList();
  closeSidebar();
}

function updateSubCategoryActive() {
  // 更新子分类项的激活状态
  document.querySelectorAll('#subCategoryNav .sidebar-item').forEach(el => {
    const subKey = el.id.replace('sub-', '');
    if (subKey === 'all' && currentSubCategory === null) {
      el.classList.add('active');
    } else {
      el.classList.toggle('active', subKey === currentSubCategory);
    }
  });
}

// ─── 筛选逻辑 ──────────────────────────────
function getFiltered() {
  let list = allQuestions;
  if (viewMode === 'favorites') list = list.filter(q => favorites[q.id]);
  if (currentPosition) list = list.filter(q => q.position === currentPosition);
  if (currentSubCategory) list = list.filter(q => q.sub_category === currentSubCategory);
  if (currentDifficulty) list = list.filter(q => q.difficulty === currentDifficulty);
  if (currentKeyword) {
    const kw = currentKeyword.toLowerCase();
    list = list.filter(q =>
      q.title.toLowerCase().includes(kw) ||
      q.description.toLowerCase().includes(kw) ||
      (q.tags && q.tags.some(t => t.toLowerCase().includes(kw)))
    );
  }
  return list;
}

// ─── 高亮关键词 ──────────────────────────────
function highlight(text, kw) {
  if (!kw) return escHtml(text);
  const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(escaped, 'gi'), m => `<em>${m}</em>`);
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── 视图切换 ──────────────────────────────
function setActiveNav(id) {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
  // 更新顶部导航高亮
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
}

function showHome() {
  viewMode = 'home';
  currentPosition = null; currentDifficulty = null; currentSubCategory = null; currentKeyword = '';
  document.getElementById('searchInput').value = '';
  setActiveNav('nav-home');
  const subSec = document.getElementById('subCategorySection');
  if (subSec) subSec.style.display = 'none';
  renderHome();
  closeSidebar();
}

function showFavorites() {
  viewMode = 'favorites';
  currentPosition = null; currentDifficulty = null; currentSubCategory = null;
  currentPage = 1;
  setActiveNav('nav-fav');
  const subSec = document.getElementById('subCategorySection');
  if (subSec) subSec.style.display = 'none';
  renderList();
  closeSidebar();
}

function filterPosition(pos) {
  viewMode = 'list';
  currentPosition = pos || null;
  currentSubCategory = null;
  currentDifficulty = null;
  currentPage = 1;

  // 显示/隐藏子分类导航
  const subSec = document.getElementById('subCategorySection');
  if (subSec) subSec.style.display = (pos === '后端开发') ? '' : 'none';

  setActiveNav(pos ? `pos-${pos}` : 'nav-all');
  updateSubCategoryActive();
  if (pos) {
    document.querySelectorAll('.nav-link').forEach(l => {
      l.classList.toggle('active', l.textContent.trim().includes(pos.replace('工程师','').replace('开发','').replace('经理','')));
    });
  }
  renderList();
  closeSidebar();
}

function filterDifficulty(diff) {
  viewMode = 'list';
  currentPosition = null;
  currentSubCategory = null;
  currentDifficulty = diff;
  currentPage = 1;
  setActiveNav(`diff-${diff}`);
  const subSec = document.getElementById('subCategorySection');
  if (subSec) subSec.style.display = 'none';
  renderList();
  closeSidebar();
}

// ─── 首页渲染 ──────────────────────────────
function renderHome() {
  const posCnts = {};
  allQuestions.forEach(q => { posCnts[q.position] = (posCnts[q.position] || 0) + 1; });
  const positions = Object.keys(posCnts).sort((a,b) => posCnts[b]-posCnts[a]);

  const favCnt = Object.keys(favorites).filter(k => favorites[k]).length;

  const cards = positions.map(pos => `
    <div class="cat-card" onclick="filterPosition('${pos}')">
      <span class="icon">${POSITION_ICONS[pos] || '📌'}</span>
      <h3>${pos}</h3>
      <p>${POSITION_DESCS[pos] || ''}</p>
      <div class="total">${posCnts[pos]} 道题目</div>
    </div>
  `).join('');

  document.getElementById('app').innerHTML = `
    <div class="breadcrumb">
      <a href="#" onclick="showHome();return false">InterviewHub</a>
      <span class="sep">›</span>
      <span>技术面试题库</span>
    </div>
    <div class="home-hero">
      <h1>技术面试题库 📚</h1>
      <p>收录 ${allQuestions.length} 道面试真题，覆盖 ${positions.length} 个技术方向。适合备战大厂、提升技术深度、系统梳理知识体系。</p>
      <div class="home-actions">
        <button class="btn-primary" onclick="filterPosition('')">开始刷题</button>
        <button class="btn-outline" onclick="showFavorites()">⭐ 我的收藏 ${favCnt > 0 ? `(${favCnt})` : ''}</button>
      </div>
    </div>
    <div style="border-bottom:1px solid var(--border); padding-bottom:20px; margin-bottom:8px;">
      <div style="font-size:13px; color:var(--text-muted); margin-bottom:12px;">📂 选择方向开始练习</div>
      <div class="cat-grid">${cards}</div>
    </div>
    <div style="padding:24px 0 0; font-size:13px; color:var(--text-muted);">
      💡 提示：使用顶部搜索框可以快速检索题目关键词，例如 "RAG"、"Spring Boot"、"微服务" 等
    </div>
  `;
}

// ─── 列表渲染 ──────────────────────────────
function renderList() {
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  currentPage = Math.min(currentPage, totalPages);
  const paged = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  // 标题
  let title = '全部题目';
  if (viewMode === 'favorites') title = '我的收藏';
  else if (currentSubCategory) title = `后端开发 · ${currentSubCategory}`;
  else if (currentPosition) title = currentPosition;
  else if (currentDifficulty) title = currentDifficulty + '难度';
  else if (currentKeyword) title = `搜索：${currentKeyword}`;

  const posCnts = {};
  allQuestions.forEach(q => { posCnts[q.position] = (posCnts[q.position] || 0) + 1; });
  const positions = Object.keys(posCnts);

  // 难度筛选按钮
  const diffs = ['初级','中级','高级','专家级'];
  const diffBtns = diffs.map(d => {
    const cnt = filtered.filter(q => q.difficulty === d).length;
    // 为当前显示题目统计各难度数量
    return `<button class="filter-btn ${currentDifficulty===d?'active':''}" onclick="setDiff('${d}')">${d} <span style="opacity:.7">${cnt}</span></button>`;
  }).join('');

  // 排序
  const sortHtml = `
    <select class="sort-select" id="sortSelect" onchange="setSort(this.value)">
      <option value="default">默认排序</option>
      <option value="diff_asc">难度 ↑</option>
      <option value="diff_desc">难度 ↓</option>
    </select>
  `;

  // 题目列表
  let listHtml = '';
  if (paged.length === 0) {
    listHtml = `<div class="empty-state"><div class="icon">📭</div><p>没有找到匹配的题目，试试换个关键词</p></div>`;
  } else {
    listHtml = `<div class="question-list">` + paged.map((q, i) => {
      const globalIdx = (currentPage-1)*PAGE_SIZE + i + 1;
      const isOpen = expandedId === q.id;
      const isFav = !!favorites[q.id];
      const tags = q.tags ? q.tags.slice(0,4).map(t => `<span class="tag">${escHtml(t)}</span>`).join('') : '';
      return `
        <div class="q-item" id="q-${q.id}">
          <div class="q-header" onclick="toggleAnswer(${q.id})">
            <div class="q-index">${globalIdx}.</div>
            <div class="q-title-area">
              <div class="q-title">${highlight(q.title, currentKeyword)}</div>
              <div class="q-meta">
                <span class="badge badge-${q.difficulty}">${q.difficulty}</span>
                <span class="badge badge-source">${escHtml(q.position)}</span>
                ${tags}
              </div>
            </div>
            <button class="q-fav ${isFav?'starred':''}" onclick="toggleFav(event,${q.id})" title="${isFav?'取消收藏':'收藏'}">
              ${isFav?'⭐':'☆'}
            </button>
            <button class="q-toggle ${isOpen?'open':''}">
              <span class="arrow">›</span>
            </button>
          </div>
          ${q.description ? `<div style="margin:8px 0 0 40px;font-size:13.5px;color:var(--text-sub);">${highlight(q.description, currentKeyword)}</div>` : ''}
          <div class="q-answer ${isOpen?'open':''}" id="ans-${q.id}">${escHtml(q.answer || '')}</div>
        </div>`;
    }).join('') + `</div>`;
  }

  // 分页
  let pagHtml = '';
  if (totalPages > 1) {
    const pages = [];
    pages.push(`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>`);
    let start = Math.max(1, currentPage-2), end = Math.min(totalPages, start+4);
    start = Math.max(1, end-4);
    if (start > 1) pages.push(`<button class="page-btn" onclick="goPage(1)">1</button>${start>2?'<span style="padding:0 4px;color:var(--text-muted)">…</span>':''}`);
    for (let p=start; p<=end; p++) {
      pages.push(`<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`);
    }
    if (end < totalPages) pages.push(`${end<totalPages-1?'<span style="padding:0 4px;color:var(--text-muted)">…</span>':''}<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`);
    pages.push(`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>›</button>`);
    pagHtml = `<div class="pagination">${pages.join('')}</div>`;
  }

  // 面包屑
  let crumbs = `<a href="#" onclick="showHome();return false">首页</a><span class="sep">›</span>`;
  if (viewMode === 'favorites') crumbs += `<span>我的收藏</span>`;
  else if (currentSubCategory) crumbs += `<a href="#" onclick="filterPosition('后端开发');return false">后端开发</a><span class="sep">›</span><span>${currentSubCategory}</span>`;
  else if (currentPosition) crumbs += `<a href="#" onclick="filterPosition('');return false">全部题目</a><span class="sep">›</span><span>${currentPosition}</span>`;
  else crumbs += `<span>${title}</span>`;

  document.getElementById('app').innerHTML = `
    <div class="breadcrumb">${crumbs}</div>
    <div class="page-hero">
      <h1>${currentSubCategory ? (SUB_CATEGORIES.find(s=>s.key===currentSubCategory)?.icon||'') : (POSITION_ICONS[currentPosition]||'')} ${title}</h1>
      <p>${currentSubCategory ? (SUB_CATEGORIES.find(s=>s.key===currentSubCategory)?.desc||'') : (currentPosition ? (POSITION_DESCS[currentPosition]||'') : '全量题目，支持按难度、关键词进行筛选检索')}</p>
      <div class="hero-stats">
        <div class="hero-stat"><span class="num">${total}</span><span class="label">共 ${total} 题</span></div>
        <div class="hero-stat"><span class="num">${currentPage}</span><span class="label">第 ${currentPage}/${totalPages} 页</span></div>
      </div>
    </div>
    <div class="toolbar">
      <span class="filter-label">难度</span>
      <button class="filter-btn ${!currentDifficulty?'active':''}" onclick="setDiff(null)">全部</button>
      ${diffBtns}
      <div class="toolbar-divider"></div>
      ${sortHtml}
      <div class="result-info">共 <strong>${total}</strong> 道题目</div>
    </div>
    ${listHtml}
    ${pagHtml}
  `;
}

function setDiff(d) {
  currentDifficulty = d || null;
  currentPage = 1;
  // 更新侧边栏高亮
  document.querySelectorAll('[id^="diff-"]').forEach(el => el.classList.remove('active'));
  if (d) { const el = document.getElementById(`diff-${d}`); if (el) el.classList.add('active'); }
  renderList();
}

function setSort(val) {
  const diffs = ['初级','中级','高级','专家级'];
  if (val === 'diff_asc') allQuestions.sort((a,b) => diffs.indexOf(a.difficulty)-diffs.indexOf(b.difficulty));
  else if (val === 'diff_desc') allQuestions.sort((a,b) => diffs.indexOf(b.difficulty)-diffs.indexOf(a.difficulty));
  else allQuestions.sort((a,b) => a.id - b.id);
  currentPage = 1;
  renderList();
}

function goPage(p) {
  const filtered = getFiltered();
  const max = Math.ceil(filtered.length / PAGE_SIZE);
  currentPage = Math.max(1, Math.min(p, max));
  expandedId = null;
  renderList();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── 答案展开 ──────────────────────────────
function toggleAnswer(id) {
  if (expandedId === id) {
    expandedId = null;
  } else {
    expandedId = id;
  }
  // 更新当前页面中已渲染的元素
  const ansEl = document.getElementById(`ans-${id}`);
  const togEl = document.querySelector(`#q-${id} .q-toggle`);
  if (ansEl) {
    document.querySelectorAll('.q-answer.open').forEach(el => {
      if (el.id !== `ans-${id}`) {
        el.classList.remove('open');
        const qId = el.id.replace('ans-','');
        const t = document.querySelector(`#q-${qId} .q-toggle`);
        if(t) t.classList.remove('open');
      }
    });
    ansEl.classList.toggle('open', expandedId === id);
    if (togEl) togEl.classList.toggle('open', expandedId === id);
  }
}

// ─── 收藏 ──────────────────────────────────
function toggleFav(e, id) {
  e.stopPropagation();
  favorites[id] = !favorites[id];
  if (!favorites[id]) delete favorites[id];
  saveStorage();
  updateFavBadge();
  const btn = document.querySelector(`#q-${id} .q-fav`);
  if (btn) {
    btn.textContent = favorites[id] ? '⭐' : '☆';
    btn.classList.toggle('starred', !!favorites[id]);
  }
}
function updateFavBadge() {
  const cnt = Object.keys(favorites).filter(k => favorites[k]).length;
  const badge = document.getElementById('fav-count');
  if (badge) {
    badge.textContent = cnt;
    badge.style.display = cnt > 0 ? 'inline' : 'none';
  }
}

// ─── 搜索 ──────────────────────────────────
let searchTimer;
function bindSearch() {
  const inp = document.getElementById('searchInput');
  inp.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      currentKeyword = inp.value.trim();
      if (currentKeyword) {
        viewMode = 'list';
        currentPosition = null;
        currentDifficulty = null;
        currentPage = 1;
        setActiveNav('');
        renderList();
      } else if (viewMode === 'list') {
        renderList();
      }
    }, 250);
  });
}

// ─── 键盘快捷键 ──────────────────────────────
function bindKeyboard() {
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
      document.getElementById('searchInput').select();
    }
    if (e.key === 'Escape') {
      document.getElementById('searchInput').blur();
      closeSidebar();
    }
  });
}

// ─── 侧边栏移动端 ──────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ─── 启动 ──────────────────────────────────
init();
</script>
</body>
</html>
